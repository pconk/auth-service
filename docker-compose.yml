services:
  db:
    image: mysql:8.0
    container_name: auth-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: warehouse_auth
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build: .
    container_name: auth-service
    ports:
      - "8081:8081"
      - "50051:50051"
    environment:
      - DB_DSN=root:rootpassword@tcp(db:3306)/warehouse_auth?charset=utf8mb4&parseTime=True&loc=Local
      - JWT_SECRET=rahasia-super-aman
      - HTTP_PORT=8081
      - GRPC_PORT=50051
    depends_on:
      db:
        condition: service_healthy